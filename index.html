<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshi Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --primary: #43b047;
            --secondary: #e52521;
            --background: #5c94fc;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-image: linear-gradient(to bottom, #5c94fc 0%, #a0c4ff 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            width: 900px;
            max-width: 95%;
            height: 600px;
            background: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* --- Section Gauche : Le Jeu --- */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            border-right: 3px dashed #ccc;
            position: relative;
        }

        h1 {
            color: var(--secondary);
            font-size: 2.5rem;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 10px;
        }

        .score-board {
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(67, 176, 71, 0.4);
            margin-bottom: 40px;
            text-align: center;
        }

        #score {
            font-size: 2.5rem;
            display: block;
        }

        .yoshi-container {
            position: relative;
            cursor: pointer;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animation de respiration (Idle) pour Yoshi */
        @keyframes idleYoshi {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-12px) scale(1.03); }
            100% { transform: translateY(0px) scale(1); }
        }
        /* L'image de Yoshi */
        .yoshi-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            object-position: bottom center; /* NOUVEAU : Garde les pieds de Yoshi fixés vers le bas */
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            user-select: none;
            -webkit-user-drag: none;
            animation: idleYoshi 2s ease-in-out infinite;
            transition: transform 0.05s ease-out;
        }

        /* Petit effet d'impact quand on clique */
        .yoshi-container:active .yoshi-img {
            animation: none; 
            transform: scale(0.92);
        }

        /* Nouvelle animation explosive pour les Goombas */
        @keyframes popOut {
            0% { 
                opacity: 1; 
                transform: translate(0, 0) scale(0.5); 
            }
            50% { 
                transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(15deg); 
            }
            100% { 
                opacity: 0; 
                transform: translate(calc(var(--tx) * 1.2), calc(var(--ty) + 40px)) scale(0.8) rotate(-20deg); 
            }
        }

        .floating-goomba {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--secondary);
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            animation: popOut 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 2px 2px 0 #fff;
            z-index: 10;
        }

        .floating-goomba img {
            width: 40px; 
            height: auto;
        }

        /* --- Section Droite : La Boutique --- */
        .shop-area {
            width: 350px;
            padding: 30px;
            background: #f8f9fa;
            overflow-y: auto;
        }

        .shop-area h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .upgrade-btn {
            width: 100%;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            text-align: left;
        }

        .upgrade-btn:hover:not(:disabled) {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #eee;
        }

        .upgrade-info h3 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 5px;
        }

        .upgrade-info p {
            font-size: 0.9rem;
            color: #666;
        }

        .cost {
            font-weight: bold;
            color: var(--secondary);
            background: #ffe5e5;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .stats {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
            text-align: center;
        }
        
        .missing-img-text {
            display: none;
            color: red;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="main-area">
            <h1>Yoshi Clicker</h1>
            <div class="score-board">
                Goombas Avalés
                <span id="score">0</span>
            </div>
            
            <div class="yoshi-container" id="yoshi-btn">
                <img src="yoshi.png" alt="Yoshi" class="yoshi-img" onerror="this.style.display='none'; document.getElementById('error-msg').style.display='block';">
                <div id="error-msg" class="missing-img-text">Vérifie tes images yoshi.png et goomba.png sur GitHub !</div>
            </div>
        </div>

        <div class="shop-area">
            <h2>Boutique 🍄</h2>

            <button class="upgrade-btn" id="buy-upgrade" disabled>
                <div class="upgrade-info">
                    <h3>Gros Appétit</h3>
                    <p>+1 Goomba par clic</p>
                    <p>Niveau : <span id="click-level">1</span></p>
                </div>
                <div class="cost"><span id="upgrade-cost">15</span> 🍄</div>
            </button>

            <button class="upgrade-btn" id="buy-autoclicker" disabled>
                <div class="upgrade-info">
                    <h3>Bébé Yoshi (Auto)</h3>
                    <p>Mange 1 Goomba / sec</p>
                    <p>Possédés : <span id="autoclickers-owned">0</span></p>
                </div>
                <div class="cost"><span id="autoclicker-cost">50</span> 🍄</div>
            </button>

            <div class="stats">
                <p>Puissance de clic : <span id="click-power-stat">1</span></p>
                <p>Goombas par seconde : <span id="gps-stat">0</span></p>
            </div>
        </div>
    </div>

    <script>
        let goombas = 0;
        let clickPower = 1;
        let autoClickers = 0;
        let autoClickerCost = 50;
        let upgradeLevel = 1;
        let upgradeCost = 15;

        const scoreEl = document.getElementById('score');
        const yoshiBtn = document.getElementById('yoshi-btn');
        const yoshiImageElement = document.querySelector('.yoshi-img');
        const btnUpgrade = document.getElementById('buy-upgrade');
        const clickLevelEl = document.getElementById('click-level');
        const upgradeCostEl = document.getElementById('upgrade-cost');
        const btnAutoClicker = document.getElementById('buy-autoclicker');
        const autoClickersOwnedEl = document.getElementById('autoclickers-owned');
        const autoClickerCostEl = document.getElementById('autoclicker-cost');
        const clickPowerStatEl = document.getElementById('click-power-stat');
        const gpsStatEl = document.getElementById('gps-stat');

        function updateUI() {
            scoreEl.innerText = Math.floor(goombas);
            clickLevelEl.innerText = upgradeLevel;
            upgradeCostEl.innerText = upgradeCost;
            autoClickersOwnedEl.innerText = autoClickers;
            autoClickerCostEl.innerText = autoClickerCost;
            clickPowerStatEl.innerText = clickPower;
            gpsStatEl.innerText = autoClickers;

            btnUpgrade.disabled = goombas < upgradeCost;
            btnAutoClicker.disabled = goombas < autoClickerCost;
        }

        // --- Changement d'image au clic (Mastication) ---
        yoshiBtn.addEventListener('mousedown', () => {
            yoshiImageElement.src = 'yoshi_mange.png'; 
        });

        yoshiBtn.addEventListener('mouseup', () => {
            yoshiImageElement.src = 'yoshi.png';
        });

        yoshiBtn.addEventListener('mouseleave', () => {
            yoshiImageElement.src = 'yoshi.png';
        });

        // --- Physique des Goombas ---
        function createFloatingGoomba(e) {
            const floater = document.createElement('div');
            floater.classList.add('floating-goomba');
            floater.innerHTML = `<img src="goomba.png" onerror="this.style.display='none'"> +${clickPower}`;
            
            const rect = yoshiBtn.getBoundingClientRect();
            const startX = e.clientX - rect.left - 20; 
            const startY = e.clientY - rect.top - 20;
            
            floater.style.left = `${startX}px`;
            floater.style.top = `${startY}px`;

            // Direction aléatoire pour l'explosion
            const randomX = (Math.random() - 0.5) * 160; 
            const randomY = -50 - (Math.random() * 70); 

            floater.style.setProperty('--tx', `${randomX}px`);
            floater.style.setProperty('--ty', `${randomY}px`);
            
            yoshiBtn.appendChild(floater);
            
            setTimeout(() => {
                floater.remove();
            }, 600);
        }

        // --- Clic principal pour gagner des points ---
        yoshiBtn.addEventListener('click', (e) => {
            goombas += clickPower;
            createFloatingGoomba(e);
            updateUI();
        });

        // --- Achats Boutique ---
        btnUpgrade.addEventListener('click', () => {
            if (goombas >= upgradeCost) {
                goombas -= upgradeCost;
                clickPower++;
                upgradeLevel++;
                upgradeCost = Math.floor(upgradeCost * 1.8);
                updateUI();
            }
        });

        btnAutoClicker.addEventListener('click', () => {
            if (goombas >= autoClickerCost) {
                goombas -= autoClickerCost;
                autoClickers++;
                autoClickerCost = Math.floor(autoClickerCost * 1.3);
                updateUI();
            }
        });

        // --- Boucle Auto-clicker ---
        setInterval(() => {
            if (autoClickers > 0) {
                goombas += autoClickers;
                updateUI();
            }
        }, 1000);

        // Initialisation
        updateUI();
    </script>
</body>
</html>
