<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshi Clicker Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --primary: #43b047;
            --secondary: #e52521;
            --background: #5c94fc;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --text: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-image: linear-gradient(to bottom, #5c94fc 0%, #a0c4ff 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Empêche la sélection de texte accidentelle en cliquant vite */
            user-select: none; 
        }

        .game-container {
            display: flex;
            width: 900px;
            max-width: 95%;
            height: 600px;
            background: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            transition: transform 0.1s;
        }

        /* --- Effet de Screen Shake (Tremblement) --- */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shake-active {
            animation: shake 0.15s ease-in-out;
        }

        /* --- Section Gauche : Le Jeu --- */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            border-right: 3px dashed #ccc;
            position: relative;
        }

        h1 {
            color: var(--secondary);
            font-size: 2.5rem;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 10px;
        }

        .score-board {
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(67, 176, 71, 0.4);
            margin-bottom: 40px;
            text-align: center;
        }

        #score {
            font-size: 3rem;
            display: block;
            line-height: 1;
            margin-top: 5px;
        }

        /* --- YOSHI SPRITE SHEET --- */
        .yoshi-container {
            position: relative;
            cursor: pointer;
            width: 250px;
            height: 250px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            /* Animation de respiration douce */
            animation: idleYoshi 2s ease-in-out infinite;
        }

        @keyframes idleYoshi {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .yoshi-sprite {
            width: 100%;
            height: 100%;
            /* L'image doit contenir 2 frames côte à côte */
            background-image: url('yoshi_sprites.png');
            /* On dit que l'image fait 2 fois la largeur de la boîte */
            background-size: 200% 100%; 
            /* On montre la partie gauche (Frame 1) */
            background-position: 0% 0; 
            background-repeat: no-repeat;
        }

        /* Quand on clique (Sprite Sheet Magie !) */
        .yoshi-container:active .yoshi-sprite {
            /* On décale l'image pour montrer la partie droite (Frame 2) */
            background-position: 100% 0; 
        }

        .yoshi-container:active {
            animation: none; /* Stoppe la respiration pendant le clic */
        }

        /* --- Physique des Goombas --- */
        @keyframes popOut {
            0% { 
                opacity: 1; 
                transform: translate(0, 0) scale(0.5); 
            }
            50% { 
                transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(15deg); 
            }
            100% { 
                opacity: 0; 
                transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) + 60px)) scale(0.8) rotate(-20deg); 
            }
        }

        .floating-goomba {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--secondary);
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            animation: popOut 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 2px 2px 0 #fff;
            z-index: 10;
        }

        .floating-goomba img {
            width: 45px; 
            height: auto;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        /* --- Section Droite : La Boutique --- */
        .shop-area {
            width: 350px;
            padding: 30px;
            background: #f8f9fa;
            overflow-y: auto;
        }

        .shop-area h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .upgrade-btn {
            width: 100%;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            text-align: left;
        }

        .upgrade-btn:hover:not(:disabled) {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #eee;
        }

        .upgrade-info h3 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 5px;
        }

        .upgrade-info p {
            font-size: 0.9rem;
            color: #666;
        }

        .cost {
            font-weight: bold;
            color: var(--secondary);
            background: #ffe5e5;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .stats {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .warning-text {
            position: absolute;
            bottom: 10px;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container" id="game-window">
        <div class="main-area">
            <h1>Yoshi Clicker</h1>
            <div class="score-board">
                Goombas Avalés
                <span id="score">0</span>
            </div>
            
            <div class="yoshi-container" id="yoshi-btn">
                <div class="yoshi-sprite"></div>
            </div>
            
            <div class="warning-text">Il faut les images "yoshi_sprites.png" et "goomba.png" sur le GitHub !</div>
        </div>

        <div class="shop-area">
            <h2>Boutique 🍄</h2>

            <button class="upgrade-btn" id="buy-upgrade" disabled>
                <div class="upgrade-info">
                    <h3>Gros Appétit</h3>
                    <p>+1 Goomba par clic</p>
                    <p>Niveau : <span id="click-level">1</span></p>
                </div>
                <div class="cost"><span id="upgrade-cost">15</span> 🍄</div>
            </button>

            <button class="upgrade-btn" id="buy-autoclicker" disabled>
                <div class="upgrade-info">
                    <h3>Bébé Yoshi (Auto)</h3>
                    <p>Mange 1 Goomba / sec</p>
                    <p>Possédés : <span id="autoclickers-owned">0</span></p>
                </div>
                <div class="cost"><span id="autoclicker-cost">50</span> 🍄</div>
            </button>

            <div class="stats">
                <p>Puissance de clic : <strong id="click-power-stat">1</strong></p>
                <p>Goombas par seconde : <strong id="gps-stat">0</strong></p>
            </div>
        </div>
    </div>

    <script>
        // --- Variables du Jeu ---
        let goombas = 0;
        let clickPower = 1;
        let autoClickers = 0;
        let autoClickerCost = 50;
        let upgradeLevel = 1;
        let upgradeCost = 15;

        // --- Éléments DOM ---
        const scoreEl = document.getElementById('score');
        const yoshiBtn = document.getElementById('yoshi-btn');
        const gameWindow = document.getElementById('game-window');
        
        const btnUpgrade = document.getElementById('buy-upgrade');
        const clickLevelEl = document.getElementById('click-level');
        const upgradeCostEl = document.getElementById('upgrade-cost');
        
        const btnAutoClicker = document.getElementById('buy-autoclicker');
        const autoClickersOwnedEl = document.getElementById('autoclickers-owned');
        const autoClickerCostEl = document.getElementById('autoclicker-cost');
        
        const clickPowerStatEl = document.getElementById('click-power-stat');
        const gpsStatEl = document.getElementById('gps-stat');

        // --- Audio (Le son culte de Yoshi !) ---
        // Utilisation d'un son hébergé publiquement. Le volume est réglé à 40%.
        const tongueSound = new Audio('https://www.myinstants.com/media/sounds/yoshi-tongue.mp3');
        tongueSound.volume = 0.4;

        // --- Mise à jour de l'interface ---
        function updateUI() {
            scoreEl.innerText = Math.floor(goombas);
            clickLevelEl.innerText = upgradeLevel;
            upgradeCostEl.innerText = upgradeCost;
            autoClickersOwnedEl.innerText = autoClickers;
            autoClickerCostEl.innerText = autoClickerCost;
            clickPowerStatEl.innerText = clickPower;
            gpsStatEl.innerText = autoClickers;

            // Désactivation des boutons si pas assez de points
            btnUpgrade.disabled = goombas < upgradeCost;
            btnAutoClicker.disabled = goombas < autoClickerCost;
        }

        // --- Création de l'explosion de Goomba ---
        function createFloatingGoomba(e) {
            const floater = document.createElement('div');
            floater.classList.add('floating-goomba');
            
            // Image du goomba + le texte du score rapporté
            floater.innerHTML = `<img src="goomba.png" onerror="this.style.display='none'"> +${clickPower}`;
            
            const rect = yoshiBtn.getBoundingClientRect();
            // On centre l'apparition sur la bouche de Yoshi
            const startX = (e.clientX || rect.left + rect.width/2) - rect.left - 20; 
            const startY = (e.clientY || rect.top + rect.height/2) - rect.top - 20;
            
            floater.style.left = `${startX}px`;
            floater.style.top = `${startY}px`;

            // Calcul d'une trajectoire explosive aléatoire
            const randomX = (Math.random() - 0.5) * 180; 
            const randomY = -60 - (Math.random() * 80); 

            floater.style.setProperty('--tx', `${randomX}px`);
            floater.style.setProperty('--ty', `${randomY}px`);
            
            yoshiBtn.appendChild(floater);
            
            // Nettoyage après l'animation
            setTimeout(() => {
                floater.remove();
            }, 600);
        }

        // --- Événement Principal : Clic sur Yoshi ---
        // On utilise mousedown pour que ce soit ultra réactif
        yoshiBtn.addEventListener('mousedown', (e) => {
            // 1. Jouer le son
            tongueSound.currentTime = 0; // Permet de rejouer le son même si le précédent n'est pas fini
            tongueSound.play().catch(err => console.log("Son bloqué par le navigateur", err));

            // 2. Faire trembler l'écran (Screen Shake)
            gameWindow.classList.remove('shake-active');
            void gameWindow.offsetWidth; // Petite astuce pour redémarrer l'animation CSS
            gameWindow.classList.add('shake-active');

            // 3. Ajouter les points
            goombas += clickPower;

            // 4. Lancer les particules
            createFloatingGoomba(e);

            // 5. Mettre à jour les textes
            updateUI();
        });

        // --- Achats Boutique ---
        btnUpgrade.addEventListener('click', () => {
            if (goombas >= upgradeCost) {
                goombas -= upgradeCost;
                clickPower++;
                upgradeLevel++;
                upgradeCost = Math.floor(upgradeCost * 1.8);
                updateUI();
            }
        });

        btnAutoClicker.addEventListener('click', () => {
            if (goombas >= autoClickerCost) {
                goombas -= autoClickerCost;
                autoClickers++;
                autoClickerCost = Math.floor(autoClickerCost * 1.3);
                updateUI();
            }
        });

        // --- Boucle Auto-clicker (chaque seconde) ---
        setInterval(() => {
            if (autoClickers > 0) {
                goombas += autoClickers;
                updateUI();
            }
        }, 1000);

        // Initialisation au chargement
        updateUI();
    </script>
</body>
</html>
